# -------------------------------------------------------
# Secret — credentials PostgreSQL
#
# Un Secret K8s stocke des données sensibles encodées
# en base64. Ce n'est PAS du chiffrement, juste de
# l'obfuscation. En prod, on utiliserait Vault ou
# Sealed Secrets pour vraiment chiffrer ces valeurs.
#
# La DATABASE_URL complète est injectée comme variable
# d'environnement dans le Deployment via envFrom.
# -------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: shopping-api-db-secret
  # Le namespace est celui dans lequel ArgoCD déploie l'app
  namespace: default
type: Opaque
stringData:
  # stringData permet d'écrire en clair — K8s encode en base64 automatiquement
  # C'est équivalent à data: avec des valeurs base64, mais plus lisible
  DATABASE_URL: "postgresql+psycopg2://shopping:shopping@shopping-db-postgresql:5432/shopping_db"
