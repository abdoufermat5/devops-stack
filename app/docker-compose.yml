version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://shopping:shopping@db:5432/shopping_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=shopping
      - POSTGRES_PASSWORD=shopping
      - POSTGRES_DB=shopping_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
